name: Build Truck (Go)

on:
  push:
    branches: [main]
    paths:
      - 'truck-go/**'
  pull_request:
    branches: [main]
    paths:
      - 'truck-go/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run tests
        working-directory: truck-go
        run: go test ./... -v

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        working-directory: truck-go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o trk-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/wiz/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trk-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wizzor-go/trk-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
