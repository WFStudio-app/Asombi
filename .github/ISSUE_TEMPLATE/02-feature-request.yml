name: "Feature Request"
description: "Suggest a new feature for Asombi OS or Wizzor"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Wizzor (package manager)
        - OS core (os login / instances)
        - Alpine base
        - install.sh
        - Documentation
        - Other
    validations:
      required: true
